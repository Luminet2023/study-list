name: study-list-local

x-api-build: &api-build
  context: ../backend
  dockerfile: Dockerfile

x-api-environment: &api-environment
  HTTP_ADDR: ":8080"
  PUBLIC_BASE_URL: "https://api.luminet.cn/hifumi/"
  FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-https://stellafortuna.luminet.cn}"
  FRONTEND_RETURN_URL: "${FRONTEND_RETURN_URL:-https://stellafortuna.luminet.cn/}"
  MYSQL_DSN: "${MYSQL_USER:-study_list}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE:-study_list}?charset=utf8mb4&parseTime=true&loc=UTC"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_KEY_PREFIX: "study-list:local:"
  LINUXDO_CLIENT_ID: "${LINUXDO_CLIENT_ID:?set LINUXDO_CLIENT_ID}"
  LINUXDO_CLIENT_SECRET: "${LINUXDO_CLIENT_SECRET:?set LINUXDO_CLIENT_SECRET}"
  SESSION_JWT_SECRET: "${SESSION_JWT_SECRET:?set SESSION_JWT_SECRET}"
  COMPAT_PROXY_SECRET: "${COMPAT_PROXY_SECRET:?set COMPAT_PROXY_SECRET}"
  SESSION_AUDIENCE: "stellafortuna"
  LEGACY_SESSION_ISSUER: "https://stellafortuna.luminet.cn"
  TRUSTED_PROXY_CIDRS: "${TRUSTED_PROXY_CIDRS:-}"
  LOG_LEVEL: "${LOG_LEVEL:-debug}"

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-study_list}"
      MYSQL_USER: "${MYSQL_USER:-study_list}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?set MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}"
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:8.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data
    restart: unless-stopped

  migrate:
    image: "ghcr.io/luminet2023/study-list:${IMAGE_TAG:-dev}"
    build: *api-build
    command: ["migrate"]
    environment:
      MYSQL_DSN: "${MYSQL_USER:-study_list}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE:-study_list}?charset=utf8mb4&parseTime=true&loc=UTC"
    depends_on:
      mysql:
        condition: service_healthy
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"

  api:
    image: "ghcr.io/luminet2023/study-list:${IMAGE_TAG:-dev}"
    build: *api-build
    command: ["serve"]
    init: true
    environment: *api-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
