syntax = "proto3";

package stella.sync.v1;

// 客户端一次 exchange 同时上传本地 outbox，并从 cursor 之后拉取远端增量。
message SyncRequest {
  string device_id = 1;
  uint64 cursor = 2;
  repeated Mutation mutations = 3;
  uint32 pull_limit = 4;
  string baseline_id = 5;
  uint64 local_version = 6;
  uint64 local_updated_at_ms = 7;
  string local_progress_day = 8;
}

enum BaselineChoice {
  BASELINE_CHOICE_UNSPECIFIED = 0;
  BASELINE_CHOICE_USE_LOCAL = 1;
  BASELINE_CHOICE_USE_SERVER = 2;
}

message Mutation {
  string op_id = 1;
  string entity_key = 2;
  uint64 base_version = 3;
  uint64 client_time_ms = 4;
  bytes value_json = 5;
  bool deleted = 6;
  string device_id = 7;
  uint64 client_seq = 8;
}

message MutationAck {
  string op_id = 1;
  uint64 server_cursor = 2;
  bool conflict = 3;
  bool applied = 4;
}

message Change {
  uint64 cursor = 1;
  string entity_key = 2;
  bytes value_json = 3;
  bool deleted = 4;
  string device_id = 5;
  uint64 client_time_ms = 6;
  string op_id = 7;
}

message SyncResponse {
  uint64 next_cursor = 1;
  repeated MutationAck acks = 2;
  repeated Change changes = 3;
  bool has_more = 4;
  bool reset_required = 5;
  string baseline_id = 6;
  uint64 server_version = 7;
  uint64 server_updated_at_ms = 8;
  string server_progress_day = 9;
  bool baseline_mismatch = 10;
}

// 客户端只上报相对本地基线的 mutation；远端连续变更由 SSE 单独下发。
message DiffRequest {
  string device_id = 1;
  repeated Mutation mutations = 2;
  string baseline_id = 3;
  uint64 local_version = 4;
  uint64 local_updated_at_ms = 5;
  string local_progress_day = 6;
}

// canonical_changes 仅用于确认本批写入的服务端最终值，不代表连续下行游标。
message DiffResponse {
  repeated MutationAck acks = 1;
  repeated Change canonical_changes = 2;
  string baseline_id = 3;
  uint64 server_cursor = 4;
  uint64 server_version = 5;
  uint64 server_updated_at_ms = 6;
  string server_progress_day = 7;
  bool baseline_mismatch = 8;
}

message ResolveBaselineRequest {
  string request_id = 1;
  string device_id = 2;
  string local_baseline_id = 3;
  string expected_server_baseline_id = 4;
  uint64 expected_server_version = 5;
  BaselineChoice choice = 6;
  repeated Mutation local_snapshot = 7;
  uint64 local_version = 8;
  uint64 local_updated_at_ms = 9;
  string local_progress_day = 10;
}

message ResolveBaselineResponse {
  string baseline_id = 1;
  uint64 server_version = 2;
  uint64 server_updated_at_ms = 3;
  string server_progress_day = 4;
  repeated Change records = 5;
  bool stale = 6;
  uint64 server_cursor = 7;
}
